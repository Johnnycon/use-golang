schema:
  - graph/*.graphqls

exec:
  filename: graph/generated.go
  package: graph

model:
  filename: graph/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: graph
  package: graph
  filename_template: "{name}.resolvers.go"

models:
  Room:
    model:
      - github.com/gotesting/api/graph/model.Room
  Message:
    model:
      - github.com/gotesting/api/graph/model.Message
  JobResult:
    model:
      - github.com/gotesting/api/graph/model.JobResult
  CalorieQuery:
    model:
      - github.com/gotesting/api/graph/model.CalorieQuery
